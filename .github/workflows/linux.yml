name: Linux

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout CI sample
      uses: actions/checkout@v6
      with:
        ref: 'ci-sample'
    - name: Install Nix
      uses: cachix/install-nix-action@v27
      with:
        nix_path: nixpkgs=channel:nixos-26.05
        extra_nix_config: |
          experimental-features = nix-command flakes
    - name: Enter shell
      run: nix develop .
    - name: Build Wax
      run: nix develop . --command "build-dev"
    - name: Run Odoo
      run: |
        createdb odoo
        nix develop . --command "run --stop-after-init -i base"
