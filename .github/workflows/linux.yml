name: Linux

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout CI sample
      uses: actions/checkout@v6
      with:
        ref: 'ci-sample'
    - name: Install PostgresQL
      run: |
        sudo apt install postgresql
        sudo service postgresql start
        sudo -u postgres createuser --superuser runner
        createdb odoo
    - name: Install Nix
      uses: cachix/install-nix-action@v27
      with:
        nix_path: nixpkgs=channel:nixos-26.05
        extra_nix_config: |
          experimental-features = nix-command flakes
    - name: Set up git
      run: |
        git config --global user.name "Wax CI Job"
        git config --global user.email "wax@wax.xxx"

    - name: Test 8.0
      run: |
        sed -i 's/16.0/8.0/' config.nix
        nix develop . --command build-dev
        nix develop . --command run --stop-after-init -i base

    - name: Test 9.0
      run: |
        rm -rf wax
        dropdb odoo
        createdb odoo
        sed -i 's/8.0/9.0/' config.nix
        nix develop . --command build-dev
        nix develop . --command run --stop-after-init -i base

    - name: Test 10.0
      run: |
        rm -rf wax
        dropdb odoo
        createdb odoo
        sed -i 's/9.0/10.0/' config.nix
        nix develop . --command build-dev
        nix develop . --command run --stop-after-init -i base

    - name: Test 11.0
      run: |
        rm -rf wax
        dropdb odoo
        createdb odoo
        sed -i 's/10.0/11.0/' config.nix
        nix develop . --command build-dev
        nix develop . --command run --stop-after-init -i base

    - name: Test 12.0
      run: |
        rm -rf wax
        dropdb odoo
        createdb odoo
        sed -i 's/11.0/12.0/' config.nix
        nix develop . --command build-dev
        nix develop . --command run --stop-after-init -i base
