name: Test with all Odoo versions

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout CI sample
      uses: actions/checkout@v6
      with:
        ref: 'ci-sample'
    - name: Install PostgresQL
      run: |
        sudo apt install postgresql
        sudo service postgresql start
        sudo -u postgres createuser --superuser runner
        createdb odoo
    - name: Install Nix
      uses: cachix/install-nix-action@v27
      with:
        nix_path: nixpkgs=channel:nixos-26.05
        extra_nix_config: |
          experimental-features = nix-command flakes
    - name: Set up git
      run: |
        git config --global user.name "Wax CI Job"
        git config --global user.email "wax@wax.xxx"

    - name: Test 19.0
      run: |
        sed -i 's/16.0/19.0/' config.nix
        ./test.sh

    - name: Test 18.0
      run: |
        sed -i 's/19.0/18.0/' config.nix
        ./test.sh

    - name: Test 17.0
      run: |
        sed -i 's/18.0/17.0/' config.nix
        ./test.sh

    - name: Test 16.0
      run: |
        sed -i 's/17.0/16.0/' config.nix
        ./test.sh

    - name: Test 15.0
      run: |
        sed -i 's/16.0/15.0/' config.nix
        ./test.sh

    - name: Test 14.0
      run: |
        sed -i 's/15.0/14.0/' config.nix
        ./test.sh

    - name: Test 13.0
      run: |
        sed -i 's/14.0/13.0/' config.nix
        ./test.sh

    - name: Test 12.0
      run: |
        sed -i 's/13.0/12.0/' config.nix
        ./test.sh

    - name: Test 11.0
      run: |
        sed -i 's/12.0/11.0/' config.nix
        ./test.sh

    - name: Test 10.0
      run: |
        sed -i 's/11.0/10.0/' config.nix
        ./test.sh

    - name: Test 9.0
      run: |
        sed -i 's/10.0/9.0/' config.nix
        ./test.sh

    - name: Test 8.0
      run: |
        sed -i 's/9.0/8.0/' config.nix
        ./test.sh
